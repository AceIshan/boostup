<!DOCTYPE html>
<html>
<head>
<title>BoostUp - Daily Motivation</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
.w3-sidebar a {font-family: "Roboto", sans-serif}
body,h1,h2,h3,h4,h5,h6,.w3-wide {font-family: "Montserrat", sans-serif;}
body {
  background: linear-gradient(180deg, #f5f7fc 0%, #faf9ff 50%, #f7f9ff 100%);
  min-height: 100vh;
}

.hero-header {
  background: linear-gradient(135deg, #c5d9f1 0%, #d4c5f9 25%, #e8d5f2 50%, #d9e5f6 75%, #c5d9f1 100%);
  background-size: 400% 400%;
  animation: gradientShift 8s ease infinite;
  color: white;
  padding: 60px 20px;
  text-align: center;
  box-shadow: 0 8px 32px rgba(197, 217, 241, 0.2);
}

@keyframes gradientShift {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.hero-header h1 {
  font-size: 48px;
  font-weight: 300;
  letter-spacing: 2px;
  margin: 0;
  text-shadow: 0 2px 8px rgba(100, 120, 200, 0.15);
}

.hero-header p {
  font-size: 18px;
  font-weight: 300;
  letter-spacing: 0.5px;
  margin-top: 8px;
  opacity: 0.95;
}

.category-btn {
  background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(240, 245, 255, 0.9)) !important;
  color: #6b7fa8 !important;
  border: 2px solid rgba(197, 217, 241, 0.6) !important;
  padding: 14px 32px !important;
  margin: 10px !important;
  font-size: 15px !important;
  font-weight: 400;
  border-radius: 20px !important;
  transition: all 0.4s ease !important;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(197, 217, 241, 0.1) !important;
}

.category-btn:hover {
  background: linear-gradient(135deg, #e8f1fa, #d9e8f6) !important;
  border-color: rgba(197, 217, 241, 1) !important;
  box-shadow: 0 8px 25px rgba(197, 217, 241, 0.25) !important;
  transform: translateY(-2px);
}

.category-btn.active {
  background: linear-gradient(135deg, #c5d9f1 0%, #d4c5f9 100%) !important;
  color: white !important;
  border-color: rgba(197, 217, 241, 1) !important;
  box-shadow: 0 8px 25px rgba(197, 217, 241, 0.35) !important;
}

.message-display {
  background: linear-gradient(135deg, rgba(245, 250, 255, 0.8) 0%, rgba(232, 225, 249, 0.6) 50%, rgba(217, 229, 246, 0.8) 100%);
  border: 1px solid rgba(197, 217, 241, 0.3);
  border-radius: 20px;
  padding: 50px 40px;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 22px;
  color: #5a6a7a;
  line-height: 1.8;
  font-weight: 300;
  box-shadow: 0 8px 32px rgba(197, 217, 241, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.8);
  transition: all 0.4s ease;
  backdrop-filter: blur(10px);
}

.action-btn {
  background: linear-gradient(135deg, #c5d9f1 0%, #d4c5f9 100%) !important;
  color: white !important;
  padding: 14px 40px !important;
  margin: 10px !important;
  font-size: 15px !important;
  font-weight: 400;
  border-radius: 20px !important;
  border: none !important;
  cursor: pointer;
  transition: all 0.4s ease !important;
  box-shadow: 0 6px 20px rgba(197, 217, 241, 0.2) !important;
}

.action-btn:hover {
  background: linear-gradient(135deg, #b3c5e8 0%, #c8b3f0 100%) !important;
  box-shadow: 0 10px 30px rgba(197, 217, 241, 0.3) !important;
  transform: translateY(-2px);
}

.action-btn:disabled {
  background: linear-gradient(135deg, #dde5f0 0%, #e0d9e8 100%) !important;
  cursor: not-allowed;
  box-shadow: 0 4px 12px rgba(197, 217, 241, 0.1) !important;
}

.reset-btn {
  background: linear-gradient(135deg, #d4c5f9 0%, #e8d5f2 100%) !important;
}

.reset-btn:hover {
  background: linear-gradient(135deg, #c8b3f0 0%, #dfc5e8 100%) !important;
}

footer {
  background: linear-gradient(180deg, rgba(245, 250, 255, 0.6), rgba(240, 245, 255, 0.4));
  color: #8b9dc3;
  border-top: 1px solid rgba(197, 217, 241, 0.2);
  backdrop-filter: blur(10px);
}

@media (max-width: 768px) {
  .hero-header h1 {font-size: 32px;}
  .hero-header p {font-size: 16px;}
  .message-display {padding: 35px 25px; font-size: 18px;}
}
</style>
</head>
<body>

<div class="hero-header">
  <h1>✨ BoostUp</h1>
  <p>Your daily motivation and confidence boost</p>
</div>

<div class="w3-container" style="max-width:1000px;margin:20px auto;">

  <div class="w3-center">
    <button class="w3-button category-btn" onclick="showMessage('motivation')">Motivation</button>
    <button class="w3-button category-btn" onclick="showMessage('confidence')">Confidence</button>
    <button class="w3-button category-btn" onclick="showMessage('stress')">Serenity</button>
  </div>

  <div class="w3-margin-top w3-margin-bottom">
    <div id="messageBox" class="message-display">Click a category to get started</div>
  </div>

  <div class="w3-center">
    <button id="newMessageBtn" class="w3-button action-btn" onclick="newMessage()" disabled>Another Message</button>
    <button id="resetBtn" class="w3-button action-btn reset-btn" onclick="resetApp()">Clear</button>
  </div>

  <div class="w3-margin-top" style="height: 1px; background: #e0e5eb;"></div>

</div>

<footer class="w3-padding-32 w3-small w3-center" style="margin-top:40px;">
  <p style="margin:0;color:#8b9dc3;font-weight:300;letter-spacing:0.3px;">Built to promote positivity and support student wellbeing</p>
  <p style="margin:10px 0 0 0;font-size:12px;">© 2026 BoostUp Project | IB Design</p>
</footer>

<script>
let currentCategory = "";

const messages = {
  motivation: [
    "Keep going, you're doing better than you think.",
    "Small steps still move you forward.",
    "You have the strength to finish what you started.",
    "Your effort today is building your future tomorrow.",
    "Progress, not perfection, is what matters.",
    "Every accomplishment begins with the decision to try.",
    "You're closer to your goals than you were yesterday.",
    "Your potential is limitless when you believe in it.",
    "Success is the sum of small efforts repeated day in and day out.",
    "Dream big, start small, and never stop.",
    "Your journey is unique—embrace it.",
    "Challenges are opportunities in disguise.",
    "Believe you can, and you're halfway there.",
    "Every day is a new chance to shine.",
    "Your hard work will pay off in ways you can't imagine.",
    "Stay focused on your path, not the obstacles.",
    "You are the architect of your own success.",
    "One positive thought can change your day.",
    "Keep pushing—great things take time."
  ],
  confidence: [
    "Believe in yourself, you are capable.",
    "You are stronger than your doubts.",
    "Confidence grows with every step you take.",
    "You've overcome challenges before, you can do it again.",
    "Your voice matters and your ideas are valuable.",
    "You are enough, exactly as you are right now.",
    "Trust yourself, you know more than you think.",
    "You have unique talents that only you can offer.",
    "Stand tall—you've earned the right to feel proud.",
    "Your confidence inspires others around you.",
    "You have the power to create change.",
    "Embrace your strengths—they make you special.",
    "You are worthy of every opportunity that comes your way.",
    "Self-belief is the key to unlocking your potential.",
    "You shine brightest when you believe in yourself.",
    "Your courage defines you, not your fears.",
    "You are a force for good in the world.",
    "Trust the process—confidence builds over time.",
    "You have everything you need within you."
  ],
  stress: [
    "Take a deep breath, you've got this.",
    "It's okay to take a break.",
    "You don't have to figure everything out today.",
    "One step at a time is all you need.",
    "Your wellbeing is more important than perfection.",
    "It's okay to ask for help when you need it.",
    "This moment is temporary, and you will get through it.",
    "Pause, breathe, and remember what truly matters.",
    "You're doing your best, and that is enough.",
    "Let go of what you can't control.",
    "Your peace of mind is a priority.",
    "Breathe in calm, breathe out stress.",
    "You are resilient and capable of handling this.",
    "Take time for yourself—you deserve it.",
    "Worrying doesn't change the outcome, action does.",
    "Find joy in the small moments.",
    "You are stronger than any challenge.",
    "Rest when you need to, recharge when you can.",
    "This too shall pass—focus on the present."
  ]
};

let shuffledMessages = {};
let messageIndices = {};

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showMessage(category) {
  currentCategory = category;
  if (!shuffledMessages[category]) {
    shuffledMessages[category] = [...messages[category]];
    shuffleArray(shuffledMessages[category]);
    messageIndices[category] = 0;
  }
  updateButtonStates(category);
  document.getElementById("newMessageBtn").disabled = false;
  newMessage();
}

function newMessage() {
  if (currentCategory === "") return;

  const messageBox = document.getElementById("messageBox");
  const list = shuffledMessages[currentCategory];
  const message = list[messageIndices[currentCategory]];
  
  messageIndices[currentCategory]++;
  if (messageIndices[currentCategory] >= list.length) {
    shuffleArray(list);
    messageIndices[currentCategory] = 0;
  }
  
  messageBox.style.opacity = 0;
  
  setTimeout(() => {
    messageBox.innerText = message;
    messageBox.style.opacity = 1;
  }, 200);
}

function resetApp() {
  currentCategory = "";
  document.getElementById("messageBox").innerText = "Click a category to get started";
  document.getElementById("newMessageBtn").disabled = true;
  updateButtonStates("");
}

function updateButtonStates(activeCategory) {
  document.querySelectorAll(".category-btn").forEach(btn => {
    btn.classList.remove("active");
  });
  const buttons = document.querySelectorAll(".category-btn");
  for (let btn of buttons) {
    if (btn.innerText.includes(activeCategory === 'motivation' ? 'Motivation' : 
                               activeCategory === 'confidence' ? 'Confidence' : 
                               activeCategory === 'stress' ? 'Serenity' : '')) {
      btn.classList.add("active");
      break;
    }
  }
}
</script>

</body>
</html>
