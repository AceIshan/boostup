<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostUp - Your Daily Motivation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #eef5ff, #f8fbff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(200, 215, 230, 0.3);
            padding: 50px;
            max-width: 600px;
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }

        h1 {
            color: #2c5aa0;
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .subtitle {
            color: #8b9dc3;
            font-size: 0.9em;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .buttons button {
            padding: 12px 26px;
            border: 1.5px solid #c8d7e6;
            background-color: white;
            color: #2c5aa0;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 110px;
            letter-spacing: 0.3px;
        }

        .buttons button:active {
            transform: scale(0.96);
        }

        .buttons button:hover {
            background-color: #e8f1fa;
            color: #1a3a6e;
            border-color: #4a90d9;
            box-shadow: 0 3px 12px rgba(42, 97, 191, 0.12);
        }

        .buttons button.active {
            background-color: #2c5aa0;
            color: white;
            border-color: #2c5aa0;
            box-shadow: 0 4px 12px rgba(42, 97, 191, 0.2);
        }

        #messageBox {
            margin: 35px 0;
            font-size: 18px;
            color: #3a4a5c;
            line-height: 1.7;
            padding: 35px;
            background: linear-gradient(135deg, #f0f5fa 0%, #e8f1f8 100%);
            border-radius: 14px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
            border: 1px solid rgba(76, 144, 216, 0.15);
            font-weight: 400;
            box-shadow: 0 8px 25px rgba(42, 97, 191, 0.08);
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        #newMessageBtn {
            padding: 12px 30px;
            background-color: #2c5aa0;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            min-width: 150px;
            letter-spacing: 0.3px;
        }

        #newMessageBtn:hover:not(:disabled) {
            background-color: #1a3a6e;
            box-shadow: 0 6px 16px rgba(42, 97, 191, 0.25);
            transform: translateY(-1px);
        }

        #newMessageBtn:active:not(:disabled) {
            transform: scale(0.96);
        }

        #newMessageBtn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        #resetBtn {
            padding: 12px 30px;
            background-color: #8b9dc3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            min-width: 150px;
            letter-spacing: 0.3px;
        }

        #resetBtn:hover {
            background-color: #6b7fa8;
            box-shadow: 0 6px 16px rgba(139, 157, 195, 0.25);
            transform: translateY(-1px);
        }

        #resetBtn:active {
            transform: scale(0.96);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #9aa7bd;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 2em;
            }

            .buttons {
                flex-direction: column;
            }

            .buttons button {
                width: 100%;
                min-width: unset;
            }

            .button-group {
                flex-direction: column;
            }

            #newMessageBtn, #resetBtn {
                width: 100%;
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ BoostUp</h1>
        <p class="subtitle">Your daily motivation and confidence boost</p>

        <div class="buttons">
            <button onclick="showMessage('motivation')" aria-label="Get motivation message">💪 Motivation</button>
            <button onclick="showMessage('confidence')" aria-label="Get confidence message">🌟 Confidence</button>
            <button onclick="showMessage('stress')" aria-label="Get stress relief message">😌 Stress Relief</button>
        </div>

        <div id="messageBox">Click a category to get started</div>

        <div class="button-group">
            <button id="newMessageBtn" onclick="newMessage()" disabled>🔄 New Message</button>
            <button id="resetBtn" onclick="resetApp()">↺ Reset</button>
        </div>
        
        <p class="footer">Built to promote positivity and support student wellbeing</p>
    </div>

    <script>
        let currentCategory = "";

        const messages = {
            motivation: [
                "Keep going, you're doing better than you think.",
                "Small steps still move you forward.",
                "You have the strength to finish what you started.",
                "Your effort today is building your future tomorrow.",
                "Progress, not perfection, is what matters.",
                "Every accomplishment begins with the decision to try.",
                "You're closer to your goals than you were yesterday.",
                "Your potential is limitless when you believe in it.",
                "Success is the sum of small efforts repeated day in and day out."
            ],
            confidence: [
                "Believe in yourself, you are capable.",
                "You are stronger than your doubts.",
                "Confidence grows with every step you take.",
                "You've overcome challenges before, you can do it again.",
                "Your voice matters and your ideas are valuable.",
                "You are enough, exactly as you are right now.",
                "Trust yourself, you know more than you think.",
                "You have unique talents that only you can offer.",
                "Stand tall—you've earned the right to feel proud."
            ],
            stress: [
                "Take a deep breath, you've got this.",
                "It's okay to take a break.",
                "You don't have to figure everything out today.",
                "One step at a time is all you need.",
                "Your wellbeing is more important than perfection.",
                "It's okay to ask for help when you need it.",
                "This moment is temporary, and you will get through it.",
                "Pause, breathe, and remember what truly matters.",
                "You're doing your best, and that is enough."
            ]
        };

        function showMessage(category) {
            currentCategory = category;
            updateButtonStates(category);
            document.getElementById("newMessageBtn").disabled = false;
            newMessage();
        }

        function newMessage() {
            if (currentCategory === "") return;

            const messageBox = document.getElementById("messageBox");
            const list = messages[currentCategory];
            let randomIndex = Math.floor(Math.random() * list.length);
            
            while (list[randomIndex] === messageBox.innerText && list.length > 1) {
                randomIndex = Math.floor(Math.random() * list.length);
            }
            
            messageBox.style.opacity = 0;
            
            setTimeout(() => {
                messageBox.innerText = list[randomIndex];
                messageBox.style.opacity = 1;
            }, 200);
        }

        function resetApp() {
            currentCategory = "";
            document.getElementById("messageBox").innerText = "Click a category to get started";
            document.getElementById("newMessageBtn").disabled = true;
            updateButtonStates("");
        }

        function updateButtonStates(activeCategory) {
            document.querySelectorAll(".buttons button").forEach(btn => {
                btn.classList.remove("active");
            });
            if (activeCategory) {
                event.target.classList.add("active");
            }
        }
    </script>

</body>
</html>
